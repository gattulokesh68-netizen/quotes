<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotes Application</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>✨ Quote of the Moment</h1>
      <p class="subtitle">Discover inspiring quotes and build your collection</p>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Quote Display Section -->
      <section class="quote-section">
        <div class="quote-card" id="quoteCard">
          <div class="quote-text" id="quoteText">
            Loading your first quote...
          </div>
          <div class="quote-author" id="quoteAuthor">
            — Unknown
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="button-group">
          <button class="btn btn-primary" id="newQuoteBtn" onclick="fetchNewQuote()">
            🎲 Get New Quote
          </button>
          <button class="btn btn-secondary" id="viewHistoryBtn" onclick="toggleHistory()">
            📚 View History
          </button>
        </div>
      </section>

      <!-- Statistics -->
      <section class="stats-section">
        <div class="stat-card">
          <span class="stat-label">Total Quotes</span>
          <span class="stat-value" id="totalQuotes">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Unique Authors</span>
          <span class="stat-value" id="uniqueAuthors">0</span>
        </div>
      </section>

      <!-- History Section -->
      <section class="history-section" id="historySection">
        <div class="history-header">
          <h2>📖 Quote History</h2>
          <button class="btn btn-small" onclick="toggleHistory()">Close</button>
        </div>
        <div class="history-list" id="historyList">
          <p class="empty-message">No quotes yet. Start by clicking "Get New Quote"!</p>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Made with ❤️ | Quotes powered by <a href="https://quotable.io" target="_blank">Quotable API</a></p>
    </footer>
  </div>

  <!-- Loading Spinner -->
  <div class="spinner" id="spinner"></div>

  <!-- Toast Notifications -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
